<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<title>Relatório Financeiro</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style/relatorio.css">

</head>

<body id="areaRelatorio">

<div class="topo">

<button onclick="voltar()">⬅ Voltar</button>

<button onclick="exportarPDF()">📄 Exportar PDF</button>

</div>

<h1>Relatório Financeiro</h1>

<div class="resumo">

<div class="card ganho">
<h3>Total Ganhos</h3>
<h2 id="totalGanhos">R$ 0</h2>
</div>

<div class="card gasto">
<h3>Total Manutenção</h3>
<h2 id="totalGastos">R$ 0</h2>
</div>

<div class="card lucro">
<h3>Lucro</h3>
<h2 id="lucro">R$ 0</h2>
</div>

</div>

<div class="section">

<h2>Ganhos de Locação</h2>

<table>

<thead>
<tr>
<th>Patinete</th>
<th>Cliente</th>
<th>Pagamento</th>
<th>Valor</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabelaGanhos"></tbody>

</table>

</div>

<div class="section">

<h2>Gastos de Manutenção</h2>

<table>

<thead>
<tr>
<th>Patinete</th>
<th>Motivo</th>
<th>Valor</th>
<th>Data</th>
</tr>
</thead>

<tbody id="tabelaManutencao"></tbody>

</table>

</div>

<!-- BIBLIOTECAS PARA GERAR PDF -->

<script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>

<script src="js/relatorio.js"></script>

</body>
</html>
